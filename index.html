<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'none'; img-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
    <title>Hover Note</title>
    <style>
      /* ── Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root { --bg-alpha: 0.78; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: transparent;
      }

      /* ── App shell ── */
      .container {
        display: flex;
        flex-direction: column;
        width: 100%; height: 100%;
        background: rgba(18, 18, 20, var(--bg-alpha));
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.55);
        overflow: hidden;
        color: #e8e8e8;
        font-size: 13px;
        font-family: "JetBrains Mono","Fira Code","Cascadia Code","Menlo",ui-monospace,monospace;
        position: relative;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 32px;
        padding: 0 8px 0 10px;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        /* Electron native drag — whole header drags, controls opt out */
        -webkit-app-region: drag;
        user-select: none;
      }

      .title {
        font-size: 11px;
        font-weight: 500;
        color: rgba(255,255,255,0.28);
        letter-spacing: 0.05em;
        pointer-events: none;
      }

      /* ── Controls ── */
      .header-controls {
        display: flex;
        align-items: center;
        gap: 6px;
        /* Must opt out of drag so buttons are clickable */
        -webkit-app-region: no-drag;
      }

      .opacity-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 58px; height: 3px;
        background: rgba(255,255,255,0.18);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      .opacity-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 10px; height: 10px;
        border-radius: 50%;
        background: rgba(255,255,255,0.6);
        cursor: pointer;
        transition: background 0.12s;
      }
      .opacity-slider::-webkit-slider-thumb:hover { background: #fff; }

      .btn {
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.35);
        font-size: 10px;
        font-family: inherit;
        font-weight: 600;
        padding: 2px 5px;
        border-radius: 4px;
        cursor: pointer;
        letter-spacing: 0.04em;
        transition: background 0.12s, color 0.12s;
      }
      .btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }

      .btn-close { font-size: 12px; padding: 2px 6px; }
      .btn-close:hover { background: rgba(255,60,60,0.22); color: #ff6b6b; }

      /* ── Textarea ── */
      .notepad {
        flex: 1;
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        resize: none;
        padding: 10px 12px 20px;
        color: #e8e8e8;
        font-family: inherit;
        font-size: 13px;
        line-height: 1.65;
        caret-color: rgba(255,255,255,0.8);
        overflow-y: auto;
      }
      .notepad::placeholder { color: rgba(255,255,255,0.16); }

      /* ── Resize grip ── */
      .resize-grip {
        position: absolute;
        bottom: 0; right: 0;
        width: 14px; height: 14px;
        pointer-events: none;
        background: repeating-linear-gradient(
          -45deg,
          transparent, transparent 2px,
          rgba(255,255,255,0.1) 2px, rgba(255,255,255,0.1) 3px
        );
        border-bottom-right-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <span class="title">Hover Note</span>
        <div class="header-controls">
          <input
            type="range"
            class="opacity-slider"
            id="opacitySlider"
            min="30" max="95" value="85"
            title="Opacity"
          />
          <button class="btn" id="copyBtn" title="Copy note">COPY</button>
          <button class="btn btn-close" id="closeBtn" title="Close">✕</button>
        </div>
      </div>

      <textarea
        class="notepad"
        id="notepad"
        placeholder="Type a reference note…"
        spellcheck="false"
        autofocus
      ></textarea>

      <div class="resize-grip" aria-hidden="true"></div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
